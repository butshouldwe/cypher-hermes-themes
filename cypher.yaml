name: cypher-cypher
label: Cypher · Cypher — Battle Ledger
description: "a scored bout under stage light — dark."

palette:
  background:
    hex: "#101013"
    alpha: 1.0
  midground:
    hex: "#f0efe8"
    alpha: 1.0
  foreground:
    hex: "#4dd6c6"
    alpha: 0.0
  warmGlow: "rgba(240, 239, 232, 0.05)"
  noiseOpacity: 0

typography:
  fontSans: '"Literata", "Literata Fallback", Georgia, serif'
  fontMono: '"Red Hat Mono", "RHM Fallback", ui-monospace, "Courier New", monospace'
  fontDisplay: '"Literata", "Literata Fallback", Georgia, serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400..700;1,7..72,400..600&family=Red+Hat+Mono:wght@400..700&display=swap"
  baseSize: "17px"
  lineHeight: "1.55"
  letterSpacing: "0"

layout:
  radius: "0.5rem"
  density: comfortable

assets:
  bg: "none"

colorOverrides:
  card: "#1d1d23"
  cardForeground: "#f0efe8"
  popover: "#17171c"
  popoverForeground: "#f0efe8"
  primary: "#4dd6c6"
  primaryForeground: "#0a1512"
  secondary: "#17171c"
  secondaryForeground: "#f0efe8"
  muted: "#17171c"
  mutedForeground: "#a3a299"
  accent: "#17171c"
  accentForeground: "#4dd6c6"
  destructive: "#e57265"
  destructiveForeground: "#0a1512"
  success: "#5fc492"
  warning: "#e0b25c"
  border: "rgba(240, 239, 232, 0.16)"
  input: "rgba(240, 239, 232, 0.16)"
  ring: "#4dd6c6"

componentStyles:
  card:
    background: "#1d1d23"
    boxShadow: "0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 12px rgba(0, 0, 0, 0.35)"
  header:
    background: "#101013"
    borderBottom: "1px solid rgba(240, 239, 232, 0.16)"
  backdrop:
    background: "#101013"
    fillerOpacity: "0"
    fillerBlendMode: "normal"
    backgroundSize: "auto"
    backgroundPosition: "center"

customCSS: |
  /* Canvas + core design-system vars. */
  :root {
    --background: #101013 !important;
    --background-base: #101013 !important;
    --midground: #f0efe8 !important;
    --midground-base: #f0efe8 !important;
    --foreground: #f0efe8 !important;
    --foreground-base: #f0efe8 !important;
    --color-foreground: #f0efe8 !important;
    --color-card: #1d1d23 !important;
    --color-card-foreground: #f0efe8 !important;
    --color-popover: #17171c !important;
    --color-popover-foreground: #f0efe8 !important;
    --color-primary: #4dd6c6 !important;
    --color-primary-foreground: #0a1512 !important;
    --color-secondary: #17171c !important;
    --color-secondary-foreground: #f0efe8 !important;
    --color-muted: #17171c !important;
    --color-muted-foreground: #a3a299 !important;
    --color-accent: #17171c !important;
    --color-accent-foreground: #4dd6c6 !important;
    --color-destructive: #e57265 !important;
    --color-ring: #4dd6c6 !important;
    --warm-glow: rgba(240, 239, 232, 0.05) !important;
    --noise-opacity-mul: 0 !important;
    --theme-asset-bg: none !important;
    --component-backdrop-filler-opacity: 0 !important;
    --component-backdrop-filler-blend-mode: normal !important;
    --border: 0 NaN% NaN% !important;
  }

  .border-border { border-color: rgba(240, 239, 232, 0.16) !important; }

  /* Root canvas + default text color. */
  html, body, #root, #root > div {
    background: #101013 !important;
    background-color: #101013 !important;
    background-image: none !important;
    color: #f0efe8 !important;
  }
  #root > div.bg-black,
  #root > div[class*="bg-black"] {
    background: #101013 !important;
    background-color: #101013 !important;
    color: #f0efe8 !important;
  }

  /* Kill branded backdrop / filler layers. */
  body::before, body::after, #root::before, #root::after {
    background: none !important; background-image: none !important; box-shadow: none !important;
  }
  .pointer-events-none.fixed.inset-0[aria-hidden="true"] {
    display: none !important; opacity: 0 !important; background: none !important;
  }
  .theme-default-filler, img.theme-default-filler {
    display: none !important; opacity: 0 !important; visibility: hidden !important;
  }

  /* Fonts: Cypher mono for code, Literata for the rest. */
  code, kbd, pre, samp, .font-mono, .font-mono-ui, .xterm, .xterm * {
    font-family: "Red Hat Mono", "RHM Fallback", ui-monospace, "Courier New", monospace !important;
  }

  /* THE FIX: the shell paints a lot of text with text-white / text-background.
     On a dark canvas that must resolve to the theme's
     light ink, or it is fine. */
  h1, h2, h3, h4, h5, h6, label, p, li, dt, dd, th, td,
  [class~="text-white"]:not(.xterm):not(.xterm *),
  [class*="text-white/"]:not(.xterm):not(.xterm *),
  [class~="text-background"]:not(.xterm):not(.xterm *),
  [class*="text-background/"]:not(.xterm):not(.xterm *),
  [class~="text-foreground"], [class~="text-neutral-900"], [class~="text-zinc-900"] {
    color: #f0efe8 !important;
  }
  [class~="text-muted-foreground"], [class*="text-muted-foreground/"],
  [class~="text-neutral-500"], [class~="text-neutral-400"],
  [class~="text-zinc-500"], [class~="text-zinc-400"],
  [class~="text-gray-500"], [class~="text-slate-500"] {
    color: #a3a299 !important;
  }
  svg[class~="text-white"], [class~="text-white"] svg, [class*="text-white/"] svg {
    color: #a3a299 !important; fill: currentColor !important; stroke: currentColor !important;
  }

  /* Primary/accent surfaces carry on-accent text. */
  [class~="bg-primary"], [class~="bg-blue-500"], [class~="bg-blue-600"], [class~="bg-blue-700"] {
    background-color: #4dd6c6 !important; color: #0a1512 !important;
  }
  [class~="bg-primary"] *, [class~="bg-blue-600"] * {
    color: #0a1512 !important; fill: #0a1512 !important; stroke: #0a1512 !important;
  }

  /* Links + headings. */
  a { color: #4dd6c6 !important; }
  h1 { font-size: 1.5rem !important; font-weight: 700 !important; }
  h2 { font-size: 1.2rem !important; font-weight: 700 !important; }
  h3 { font-weight: 600 !important; }

  /* Active controls -> primary reverse-video. */
  button[aria-current="page"], button[aria-selected="true"], button[aria-pressed="true"],
  button[data-state="active"], button[data-active="true"],
  [role="button"][aria-current="page"], [role="button"][data-state="active"] {
    background: #4dd6c6 !important; background-color: #4dd6c6 !important;
    background-image: none !important; color: #0a1512 !important; border-color: #4dd6c6 !important;
  }
  button[aria-current="page"] *, button[data-state="active"] *,
  [role="button"][aria-current="page"] * {
    color: #0a1512 !important; fill: #0a1512 !important; stroke: #0a1512 !important;
  }

  /* Sidebar: chrome tint, legible sizing, primary active row. */
  #app-sidebar {
    background: #1d1d23 !important; background-color: #1d1d23 !important;
    border-right: 1px solid rgba(240, 239, 232, 0.16) !important;
  }
  #app-sidebar nav a, #app-sidebar nav a[class*="opacity-"] {
    opacity: 1 !important; color: #f0efe8 !important; font-weight: 500 !important;
    border-radius: 0.5rem !important; margin: 0.1rem 0.5rem !important;
    padding-top: 0.6rem !important; padding-bottom: 0.6rem !important;
  }
  #app-sidebar nav a svg, #app-sidebar nav a span { color: inherit !important; }
  #app-sidebar nav a[aria-current="page"] {
    background: #4dd6c6 !important; color: #0a1512 !important; opacity: 1 !important;
  }
  #app-sidebar nav a[aria-current="page"] svg, #app-sidebar nav a[aria-current="page"] span {
    color: #0a1512 !important;
  }
  #app-sidebar nav a, #app-sidebar nav a span,
  #app-sidebar li [role="button"], #app-sidebar li button, #app-sidebar li button span {
    font-size: 0.98rem !important; line-height: 1.35 !important;
  }
  #app-sidebar nav svg, #app-sidebar li svg { width: 1rem !important; height: 1rem !important; }
  #app-sidebar [id="hermes-sidebar-plugin-nav-heading"],
  #app-sidebar > div > span, #app-sidebar [class*="text-[0.6rem]"] {
    font-size: 0.82rem !important; line-height: 1.25 !important; color: #a3a299 !important;
  }

  /* Kanban: wrap instead of horizontal scroll. */
  .hermes-kanban-columns {
    display: flex !important; flex-wrap: wrap !important; align-items: stretch !important;
    overflow-x: visible !important; gap: 0.75rem !important;
  }
  .hermes-kanban-column { flex: 1 1 280px !important; min-width: 260px !important; max-width: 420px !important; max-height: none !important; }
  @media (max-width: 720px) { .hermes-kanban-column { flex-basis: 100% !important; max-width: none !important; } }
